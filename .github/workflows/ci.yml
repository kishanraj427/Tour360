name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env for tests
        run: |
          echo "GOOGLE_API_KEY=ci_test_key" > .env
          echo "GOOGLE_CX=ci_test_cx" >> .env

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
